{% extends "base.html" %}
{% load static %}
{% block content %}
<style>
    .hero-container {
        position: relative;
        width: 100%;
    }

    .hero-gradient-bg {
        width: 100%;
        height: 320px;
        background: linear-gradient(to bottom, #212529 10%, #b70000 100%);
        /* #da0000 */
        /* box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); */
    }

    .search-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80%;
        max-width: 550px;
        z-index: 2;
    }

    .search-row {
        background: rgba(255, 255, 255, 0.15);
        padding: 15px;
        border-radius: 50px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.25);
    }
</style>

<div>
    <div class="hero-container">
        <div class="hero-gradient-bg"></div>

        <div class="search-overlay">
            <div class="row g-2 justify-content-center align-items-center search-row">
                <div class="col">
                    <input type="text" class="form-control form-control-lg" placeholder="Search...">
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary btn-lg d-inline-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            class="bi bi-search" viewBox="0 0 16 16">
                            <path
                                d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
